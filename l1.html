<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掼蛋入门 | 掼蛋宗师 L1 筑基篇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Noto Sans SC', sans-serif; }</style>
</head>
<body class="bg-emerald-50 text-slate-800">
    <nav class="p-6 bg-white shadow-sm">
        <a href="index.html" class="text-emerald-600 font-bold">← 返回主页</a>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-bold mb-8 text-emerald-800">L1 入门·筑基篇：基础规则</h1>
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-emerald-100 prose prose-emerald max-w-none">
            <h2 class="text-2xl font-bold mb-4">1. 游戏目标</h2>
            <p class="mb-6 leading-relaxed">掼蛋采用两副扑克牌，由四人参加，相对的两人为一方（对家）。目标是尽可能快地将手中的牌全部出完。</p>
            
            <h2 class="text-2xl font-bold mb-4">2. 基础牌型</h2>
            <ul class="list-disc pl-6 space-y-2 mb-6">
                <li><strong>单张</strong>：任意一张牌。</li>
                <li><strong>对子</strong>：两张数值相同的牌。</li>
                <li><strong>三连对</strong>：三对连续的牌（如 334455）。</li>
                <li><strong>钢板</strong>：两组连续的三张（如 333444）。</li>
                <li><strong>顺子</strong>：五张连续的牌。</li>
            </ul>

            <h2 class="text-2xl font-bold mb-4 text-red-600">3. 逢人配（核心秘籍）</h2>
            <p class="mb-6 bg-red-50 p-4 rounded-lg border border-red-100">当前打几，红桃的那个数值就是“逢人配”。它除了大王和小王之外，可以当作任何牌使用。</p>
        </div>
    </main>
</body>
</html>
